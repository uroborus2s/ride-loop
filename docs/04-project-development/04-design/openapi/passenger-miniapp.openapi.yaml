openapi: 3.1.0
info:
  title: ride-loop Passenger Miniapp API
  version: 1.0.0-draft
  summary: 千乘坊乘客微信小程序接口契约
  description: |
    设计阶段接口合同。用于乘客端页面开发、接口模拟和联调准备。
servers:
  - url: https://api.ride-loop.local
tags:
  - name: Auth
  - name: Profile
  - name: Mall
  - name: Ride
  - name: Support
security:
  - bearerAuth: []
paths:
  /api/v1/auth/session:
    post:
      tags: [Auth]
      operationId: createPassengerSession
      summary: 创建乘客会话
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PassengerSessionRequest'
      responses:
        '200':
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Error401'
  /api/v1/me/profile:
    get:
      tags: [Profile]
      operationId: getCurrentPassengerProfile
      summary: 查询当前用户身份与能力
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Error401'
  /api/v1/mall/products:
    get:
      tags: [Mall]
      operationId: listPassengerMallProducts
      summary: 查询商品列表
      parameters:
        - in: query
          name: scene
          schema:
            type: string
            enum: [mall, driver-zone]
          required: true
        - in: query
          name: categoryId
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: pageNo
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: 商品列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
  /api/v1/mall/products/{productId}:
    get:
      tags: [Mall]
      operationId: getPassengerMallProductDetail
      summary: 查询商品详情
      parameters:
        - $ref: '#/components/parameters/ProductId'
        - in: query
          name: scene
          schema:
            type: string
            enum: [mall, driver-zone]
          required: true
      responses:
        '200':
          description: 商品详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetailResponse'
        '404':
          $ref: '#/components/responses/Error404'
  /api/v1/mall/orders:
    post:
      tags: [Mall]
      operationId: createPassengerMallOrder
      summary: 创建商城订单
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MallOrderCreateRequest'
      responses:
        '200':
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MallOrderResponse'
        '409':
          $ref: '#/components/responses/Error409'
    get:
      tags: [Mall]
      operationId: listPassengerMallOrders
      summary: 查询商城订单列表
      parameters:
        - in: query
          name: scene
          schema:
            type: string
            enum: [mall, driver-zone]
            default: mall
        - in: query
          name: orderStatus
          schema:
            type: string
            enum: [pending_pay, paid, fulfilling, completed, refunding, refunded]
        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 订单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MallOrderListResponse'
  /api/v1/mall/orders/{orderId}:
    get:
      tags: [Mall]
      operationId: getPassengerMallOrderDetail
      summary: 查询商城订单详情
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MallOrderDetailResponse'
        '404':
          $ref: '#/components/responses/Error404'
  /api/v1/ride/orders:
    post:
      tags: [Ride]
      operationId: createRideOrder
      summary: 创建叫车订单
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RideOrderCreateRequest'
      responses:
        '200':
          description: 叫车订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideOrderCreateResponse'
        '422':
          $ref: '#/components/responses/Error422'
  /api/v1/ride/orders/{orderId}:
    get:
      tags: [Ride]
      operationId: getRideOrderDetail
      summary: 查询叫车订单详情
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: 叫车订单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RideOrderDetailResponse'
        '404':
          $ref: '#/components/responses/Error404'
  /api/v1/support/tickets:
    post:
      tags: [Support]
      operationId: createPassengerSupportTicket
      summary: 创建工单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportTicketCreateRequest'
      responses:
        '200':
          description: 工单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketResponse'
    get:
      tags: [Support]
      operationId: listPassengerSupportTickets
      summary: 查询我的工单
      parameters:
        - in: query
          name: ticketStatus
          schema:
            type: string
            enum: [created, accepted, transferred, pending_external, resolved, reopened, closed]
        - in: query
          name: pageNo
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 工单列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketListResponse'
  /api/v1/support/tickets/{ticketId}:
    get:
      tags: [Support]
      operationId: getPassengerSupportTicketDetail
      summary: 查询工单详情
      parameters:
        - $ref: '#/components/parameters/TicketId'
      responses:
        '200':
          description: 工单详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicketDetailResponse'
        '404':
          $ref: '#/components/responses/Error404'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string
    TicketId:
      in: path
      name: ticketId
      required: true
      schema:
        type: string
    IdempotencyKey:
      in: header
      name: X-Idempotency-Key
      required: true
      schema:
        type: string
  responses:
    Error401:
      description: 未授权
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error404:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error409:
      description: 状态冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error422:
      description: 请求语义无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    PassengerSessionRequest:
      type: object
      required: [wechatCode, clientType]
      properties:
        wechatCode:
          type: string
        clientType:
          type: string
          enum: [passenger-miniapp]
        invitationScene:
          type: string
          enum: [qr, share, organic]
    SessionResponse:
      type: object
      properties:
        sessionToken:
          type: string
        userId:
          type: string
        roles:
          type: array
          items:
            type: string
    ProfileResponse:
      type: object
      properties:
        userId:
          type: string
        nickname:
          type: string
        roles:
          type: array
          items:
            type: string
        cityCode:
          type: string
        attributionHint:
          type: object
          properties:
            referralDriverId:
              type: string
            sessionExpiresAt:
              type: string
              format: date-time
    ProductCard:
      type: object
      properties:
        productId:
          type: string
        title:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        scene:
          type: string
        fulfillmentType:
          type: string
          enum: [in_store_verify, pickup, delivery]
        promotionTag:
          type: string
    ProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductCard'
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    ProductDetailResponse:
      type: object
      properties:
        product:
          allOf:
            - $ref: '#/components/schemas/ProductCard'
            - type: object
              properties:
                description:
                  type: string
                stockStatus:
                  type: string
                  enum: [available, low_stock, sold_out, offline]
                couponEligibility:
                  type: array
                  items:
                    type: string
    MallOrderCreateRequest:
      type: object
      required: [scene, items]
      properties:
        scene:
          type: string
          enum: [mall, driver-zone]
        attributionSessionId:
          type: string
        couponIds:
          type: array
          items:
            type: string
        walletAmount:
          type: number
        deliveryInfo:
          type: object
          properties:
            fulfillmentType:
              type: string
              enum: [in_store_verify, pickup, delivery]
            contactName:
              type: string
            contactPhone:
              type: string
            addressText:
              type: string
            storeId:
              type: string
        items:
          type: array
          items:
            type: object
            required: [skuId, quantity]
            properties:
              skuId:
                type: string
              quantity:
                type: integer
                minimum: 1
    MallOrderResponse:
      type: object
      properties:
        orderId:
          type: string
        orderStatus:
          type: string
        paymentIntent:
          type: string
        deductionSummary:
          type: object
          properties:
            itemAmount:
              type: number
            couponDeduction:
              type: number
            walletDeduction:
              type: number
            payAmount:
              type: number
    MallOrderListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              orderId:
                type: string
              orderStatus:
                type: string
              orderTitle:
                type: string
              amount:
                type: number
              createdAt:
                type: string
                format: date-time
        pageNo:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    MallOrderDetailResponse:
      type: object
      properties:
        orderId:
          type: string
        orderStatus:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              skuId:
                type: string
              title:
                type: string
              quantity:
                type: integer
              amount:
                type: number
        fulfillmentInfo:
          type: object
        refundInfo:
          type: object
    RideOrderCreateRequest:
      type: object
      required: [origin, destination]
      properties:
        attributionSessionId:
          type: string
        origin:
          $ref: '#/components/schemas/LocationPoint'
        destination:
          $ref: '#/components/schemas/LocationPoint'
        estimatedPrice:
          type: number
    RideOrderCreateResponse:
      type: object
      properties:
        rideOrderId:
          type: string
        orderStatus:
          type: string
          enum: [created, dispatching, accepted, cancelled, dispatch_failed_pending_manual]
        dispatchRequestId:
          type: string
    RideOrderDetailResponse:
      type: object
      properties:
        rideOrderId:
          type: string
        orderStatus:
          type: string
        passengerPrice:
          type: number
        driverInfo:
          type: object
        timeline:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              occurredAt:
                type: string
                format: date-time
              note:
                type: string
    LocationPoint:
      type: object
      required: [lng, lat, address]
      properties:
        lng:
          type: number
        lat:
          type: number
        address:
          type: string
    SupportTicketCreateRequest:
      type: object
      required: [bizType, bizId, ticketType, description]
      properties:
        bizType:
          type: string
          enum: [mall-order, ride-order, wallet-entry]
        bizId:
          type: string
        ticketType:
          type: string
          enum: [refund, complaint, appeal, consultation]
        description:
          type: string
        attachments:
          type: array
          items:
            type: string
    SupportTicketResponse:
      type: object
      properties:
        ticketId:
          type: string
        status:
          type: string
    SupportTicketListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              ticketId:
                type: string
              status:
                type: string
              bizType:
                type: string
              bizId:
                type: string
              createdAt:
                type: string
                format: date-time
        total:
          type: integer
    SupportTicketDetailResponse:
      type: object
      properties:
        ticket:
          type: object
          properties:
            ticketId:
              type: string
            status:
              type: string
            description:
              type: string
        timeline:
          type: array
          items:
            type: object
            properties:
              action:
                type: string
              operatorRole:
                type: string
              occurredAt:
                type: string
                format: date-time
              note:
                type: string
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        details:
          type: array
          items:
            type: object
